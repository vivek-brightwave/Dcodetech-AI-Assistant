version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - QDRANT_HOST=qdrant
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
    depends_on:
      - qdrant
    volumes:
      - ./backend/auth.db:/app/backend/auth.db
      - ./backend/qdrant_storage:/app/backend/qdrant_storage
    extra_hosts:
      - "host.docker.internal:host-gateway"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./backend/qdrant_storage:/qdrant/storage
